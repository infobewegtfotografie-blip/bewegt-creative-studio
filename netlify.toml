[build]
  publish = "."

[[plugins]]
  package = "./update-sitemap.js"

[[redirects]]
  from = "/thank-you"
  to = "/thank-you.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = """default-src 'self';
  script-src 'self' 'unsafe-inline'
    https://www.googletagmanager.com
    https://www.clarity.ms
    https://cdn.clarity.ms
    https://calendly.com
    https://assets.calendly.com;
  style-src 'self' 'unsafe-inline'
    https://assets.calendly.com;
  frame-src
    https://www.youtube-nocookie.com
    https://www.youtube.com
    https://player.vimeo.com
    https://calendly.com
    https://open.spotify.com
    https://podcasters.spotify.com;
  img-src 'self' data: blob:
    https://www.google-analytics.com
    https://www.googletagmanager.com
    https://www.clarity.ms
    https://i.ytimg.com
    https://img.youtube.com;
  font-src 'self'
    https://assets.calendly.com;
  connect-src 'self'
    https://www.google-analytics.com
    https://analytics.google.com
    https://region1.google-analytics.com
    https://region1.analytics.google.com
    https://stats.g.doubleclick.net
    https://www.googletagmanager.com
    https://www.clarity.ms
    https://c.bing.com
    https://calendly.com
    https://open.er-api.com;
  media-src 'self';
  object-src 'none';
  base-uri 'self';
  form-action 'self';
  frame-ancestors 'none'"""

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/portfolio-designs/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/audio/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"


# ═══ BOT TRAPS — chemins WordPress/CMS jamais présents sur ce site ═══
# Retourne 404 immédiatement sans exposer d'info

[[redirects]]
  from = "/wp-admin/*"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/wp-login.php"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/wp-content/*"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/wp-includes/*"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/xmlrpc.php"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/.env"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/.git/*"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/admin/*"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/phpmyadmin/*"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/config.php"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/setup.php"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/.well-known/security.txt"
  to = "/security.txt"
  status = 200

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
